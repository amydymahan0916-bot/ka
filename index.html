<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"Vazirmatn";
    background:#070b14;
    color:white;
    direction:rtl;
}

/* GRID BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}

/* TOP STEPPER */
.stepper{
    display:flex;
    justify-content:space-between;
    padding:20px 15px;
    max-width:420px;
    margin:auto;
}

.step{
    text-align:center;
    flex:1;
    position:relative;
}

.step .circle{
    width:38px;
    height:38px;
    margin:auto;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    color:#aaa;
}

.step.active .circle{
    border-color:#2f81f7;
    color:#2f81f7;
    box-shadow:0 0 12px rgba(47,129,247,0.4);
}

.step span{
    font-size:11px;
    opacity:0.6;
}

/* HEADER CARD */
.header{
    text-align:center;
    margin-top:10px;
}

.logo{
    width:85px;
    height:85px;
    margin:auto;
    border-radius:50%;
    background:radial-gradient(circle,#0d1b2a,#05070d);
    border:2px solid #2f81f7;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    color:#2f81f7;
    box-shadow:0 0 25px rgba(47,129,247,0.4);
}

h1{
    font-size:30px;
    margin-top:10px;
}

.badges{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    margin-top:10px;
}

.badge{
    font-size:11px;
    padding:6px 10px;
    border-radius:20px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
}

/* ALERT */
.alert{
    margin:20px auto;
    width:90%;
    max-width:420px;
    padding:12px;
    border-radius:12px;
    border:1px solid #f59e0b;
    background:rgba(245,158,11,0.08);
    color:#fbbf24;
    display:flex;
    justify-content:space-between;
}

/* SECTION */
.section{
    text-align:center;
    margin-top:20px;
}

.section h3{
    font-size:17px;
    opacity:0.9;
}

/* PLAN BOXES */
.plans{
    display:flex;
    flex-direction:column;
    gap:15px;
    align-items:center;
    margin-top:15px;
}

.plan{
    width:90%;
    max-width:420px;
    padding:16px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.plan-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.plan h3{
    margin:0;
    color:#2f81f7;
    font-size:16px;
}

.plan small{
    opacity:0.6;
}

.price{
    margin-top:10px;
    color:#00e676;
    font-weight:bold;
}

/* RADIO */
.radio{
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.2);
}

/* BUTTON */
button{
    width:100%;
    margin-top:12px;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#00c853,#00e676);
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- STEP -->
<div class="stepper">
    <div class="step active">
        <div class="circle">1</div>
        <span>انتخاب</span>
    </div>
    <div class="step">
        <div class="circle">2</div>
        <span>کاربر</span>
    </div>
    <div class="step">
        <div class="circle">3</div>
        <span>شماره</span>
    </div>
    <div class="step">
        <div class="circle">4</div>
        <span>پرداخت</span>
    </div>
    <div class="step">
        <div class="circle">5</div>
        <span>دریافت</span>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <div class="logo">N</div>
    <h1>NabegheVPN</h1>

    <div class="badges">
        <div class="badge">پشتیبانی ۲۴/۷</div>
        <div class="badge">سرعت بالا</div>
        <div class="badge">نامحدود</div>
    </div>
</div>

<!-- ALERT -->
<div class="alert">
    <div>اختلال در برخی اپراتورها</div>
    <div>⚡</div>
</div>

<!-- TITLE -->
<div class="section">
    <h3>مدت زمان سرویس را انتخاب کنید</h3>
</div>

<!-- PLANS -->
<div class="plans">

    <div class="plan">
        <div class="plan-top">
            <div>
                <h3>تک کاربره</h3>
                <small>دستگاه محدود</small>
            </div>
            <div class="radio"></div>
        </div>
        <div class="price">350,000 تومان</div>
        <button>انتخاب</button>
    </div>

    <div class="plan">
        <div class="plan-top">
            <div>
                <h3>دو کاربره</h3>
                <small>دو دستگاه</small>
            </div>
            <div class="radio"></div>
        </div>
        <div class="price">500,000 تومان</div>
        <button>انتخاب</button>
    </div>

</div>

</body>
        </html>
