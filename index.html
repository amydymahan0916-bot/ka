<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه کانفیگ ماهان</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"Vazirmatn",sans-serif;
    background:#070b14;
    color:white;
    direction:rtl;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}

.header{
    text-align:center;
    padding:40px 15px 10px;
}

.header h1{
    font-size:26px;
    background:linear-gradient(90deg,#00c853,#2f81f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    opacity:0.75;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    padding:10px;
}

.card{
    width:92%;
    max-width:380px;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
}

.title{color:#2f81f7;font-size:18px}
.price{color:#00e676;font-weight:bold;margin-top:10px}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.buy{
    background:linear-gradient(135deg,#00c853,#00e676);
}

.pay{
    width:92%;
    max-width:380px;
    margin:20px auto;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
}

.bank{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
}

select{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
    margin-top:10px;
}

.hidden{display:none;}

.smallPrice{
    margin-top:10px;
    color:#ffb300;
    font-weight:bold;
}

.payBox{
    width:92%;
    max-width:380px;
    margin:20px auto;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.05);
}

.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.total{
    text-align:center;
    padding:10px;
    background:#0f172a;
    border-radius:10px;
    margin-top:10px;
    color:#00e676;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
    <h1>⚡ فروشگاه کانفیگ ماهان</h1>
</div>

<!-- STEP 1 -->
<div class="container" id="step1">

    <div class="card">
        <div class="title">۱ هفته‌ای</div>
        <div class="price">120,000 تومان</div>
        <button class="buy" onclick="selectPlan('۱ هفته‌ای',120000)">انتخاب</button>
    </div>

    <div class="card">
        <div class="title">۲ هفته‌ای</div>
        <div class="price">220,000 تومان</div>
        <button class="buy" onclick="selectPlan('۲ هفته‌ای',220000)">انتخاب</button>
    </div>

    <div class="card">
        <div class="title">۱ ماهه</div>
        <div class="price">350,000 تومان</div>
        <button class="buy" onclick="selectPlan('۱ ماهه',350000)">انتخاب</button>
    </div>

</div>

<!-- STEP 2 -->
<div class="container hidden" id="step2">

    <div class="card">
        <div class="title">👤 انتخاب تعداد کاربر</div>

        <select id="users" onchange="updatePrice()">
            <option value="1">1 کاربره</option>
            <option value="2">2 کاربره</option>
            <option value="3">3 کاربره</option>
        </select>

        <div class="smallPrice" id="livePrice">قیمت: ---</div>

        <button class="buy" onclick="goPay()">ادامه</button>
    </div>

</div>

<!-- STEP 3 -->
<div class="payBox hidden" id="step3">

    <h3>💳 پرداخت نهایی</h3>

    <div class="row"><span>پلن</span><span id="pPlan"></span></div>
    <div class="row"><span>کاربر</span><span id="pUser"></span></div>
    <div class="row"><span>قیمت پایه</span><span id="pBase"></span></div>
    <div class="row"><span>تخفیف</span><span id="pDiscount"></span></div>

    <div class="total" id="pFinal"></div>

    <div class="bank">
        💳 6037 **** **** 4360<br>
        👤 ماهان امیدی
    </div>

    <button class="buy" onclick="copyCard()">کپی کارت</button>

</div>

<script>

function format(n){
    return n.toLocaleString("en-US");
}

let plan="";
let base=0;
let users=1;

function selectPlan(name,price){
    plan=name;
    base=price;

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");

    updatePrice();
}

function updatePrice(){
    users=document.getElementById("users").value;
    let price=base*users;

    document.getElementById("livePrice").innerText =
    "💰 قیمت لحظه‌ای: " + format(price) + " تومان";
}

function goPay(){

    let price=base*users;

    let discountPercent=Math.floor(Math.random()*15)+1;
    let discount=Math.floor(price*discountPercent/100);
    let final=price-discount;

    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.remove("hidden");

    document.getElementById("pPlan").innerText=plan;
    document.getElementById("pUser").innerText=users+" کاربره";
    document.getElementById("pBase").innerText=format(price)+" تومان";
    document.getElementById("pDiscount").innerText=discountPercent+"% (-"+format(discount)+")";
    document.getElementById("pFinal").innerText="💳 مبلغ نهایی: "+format(final)+" تومان";
}

function copyCard(){
    navigator.clipboard.writeText("6037997194784360");
    alert("کپی شد");
}

</script>

</body>
</html>
