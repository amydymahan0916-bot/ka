<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه کانفیگ ماهان</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"Vazirmatn",sans-serif;
    background:#070b14;
    color:white;
    direction:rtl;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
}

/* HEADER */
.header{
    text-align:center;
    padding:35px 15px 10px;
}

.header h1{
    font-size:26px;
    background:linear-gradient(90deg,#00c853,#2f81f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* STEPS */
.steps{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    flex-wrap:wrap;
}

.step{
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
    background:rgba(255,255,255,0.05);
}

/* CONTAINER */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    padding:10px;
}

/* CARD */
.card{
    width:92%;
    max-width:380px;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
}

.title{color:#2f81f7;font-size:18px}
.price{color:#00e676;font-weight:bold;margin-top:10px}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.buy{
    background:linear-gradient(135deg,#00c853,#00e676);
}

.pay{
    width:92%;
    max-width:380px;
    margin:20px auto;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
}

.bank{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
}

select{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
    margin-top:10px;
}

.hidden{display:none;}

.discount{
    color:#ffb300;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
    <h1>⚡ فروشگاه کانفیگ ماهان</h1>
</div>

<!-- STEP INDICATOR -->
<div class="steps">
    <div class="step">1 انتخاب پلن</div>
    <div class="step">2 انتخاب کاربر</div>
    <div class="step">3 پرداخت</div>
</div>

<!-- STEP 1: PLANS -->
<div class="container" id="step1">

    <div class="card">
        <div class="title">۱ هفته‌ای</div>
        <div class="price">120,000 تومان</div>
        <button class="buy" onclick="selectPlan('۱ هفته‌ای',120000)">انتخاب</button>
    </div>

    <div class="card">
        <div class="title">۲ هفته‌ای</div>
        <div class="price">220,000 تومان</div>
        <button class="buy" onclick="selectPlan('۲ هفته‌ای',220000)">انتخاب</button>
    </div>

    <div class="card">
        <div class="title">۱ ماهه</div>
        <div class="price">350,000 تومان</div>
        <button class="buy" onclick="selectPlan('۱ ماهه',350000)">انتخاب</button>
    </div>

</div>

<!-- STEP 2: USERS -->
<div class="container hidden" id="step2">

    <div class="card">
        <div class="title">👤 انتخاب تعداد کاربر</div>

        <select id="users">
            <option value="1">1 کاربره</option>
            <option value="2">2 کاربره</option>
            <option value="3">3 کاربره</option>
        </select>

        <button class="buy" onclick="goPay()">ادامه</button>
    </div>

</div>

<!-- STEP 3: PAYMENT -->
<div class="pay hidden" id="step3">

    <h3>💳 پرداخت نهایی</h3>

    <div class="bank" id="info"></div>

    <div class="bank">
        💳 6037997194784360
        <br>
        👤 ماهان امیدی
    </div>

    <div class="bank" id="finalPrice"></div>

    <button class="buy" onclick="copyCard()">کپی کارت</button>
    <button class="buy" onclick="paid()">✔ پرداخت کردم</button>

</div>

<script>

let planName="";
let basePrice=0;

function selectPlan(name,price){
    planName = name;
    basePrice = price;

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
}

function goPay(){

    let users = document.getElementById("users").value;

    let price = basePrice * users;

    let discountPercent = Math.floor(Math.random()*6)+10;
    let discount = Math.floor(price * (discountPercent/100));
    let final = price - discount;

    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.remove("hidden");

    document.getElementById("info").innerHTML =
    "📦 پلن: " + planName + "<br>👤 کاربران: " + users;

    document.getElementById("finalPrice").innerHTML =
    "💰 قیمت اصلی: " + price + "<br>" +
    "🔥 تخفیف: " + discountPercent + "% (-" + discount + ")<br><br>" +
    "<b class='discount'>💳 مبلغ نهایی: " + final + " تومان</b>";
}

function copyCard(){
    navigator.clipboard.writeText("6037997194784360");
    alert("کپی شد");
}

function paid(){
    alert("سفارش ثبت شد");
}

</script>

</body>
</html>
