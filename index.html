<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه کانفیگ ماهان</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"Vazirmatn",sans-serif;
    background:#070b14;
    color:white;
    direction:rtl;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}

.header{
    text-align:center;
    padding:40px 15px 10px;
}

.header h1{
    font-size:26px;
    background:linear-gradient(90deg,#00c853,#2f81f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{opacity:0.75;}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    padding:10px;
}

.card{
    width:92%;
    max-width:380px;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
}

.title{color:#2f81f7;font-size:18px}
.price{color:#00e676;font-weight:bold;margin-top:10px}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.buy{
    background:linear-gradient(135deg,#00c853,#00e676);
}

.pay{
    width:92%;
    max-width:380px;
    margin:20px auto;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    text-align:center;
}

.bank{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
}

select{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    background:#0f172a;
    color:white;
}

.hidden{display:none;}

.discount{
    color:#ffb300;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
    <h1>⚡ فروشگاه کانفیگ ماهان</h1>
    <p>بدون قطعی | مناسب گیم</p>
</div>

<!-- PLANS -->
<div class="container" id="plans">

    <div class="card">
        <div class="title">۱ هفته‌ای</div>
        <div class="price">120,000 تومان</div>
        <button class="buy" onclick="goPay('۱ هفته‌ای',120000)">خرید</button>
    </div>

    <div class="card">
        <div class="title">۲ هفته‌ای</div>
        <div class="price">220,000 تومان</div>
        <button class="buy" onclick="goPay('۲ هفته‌ای',220000)">خرید</button>
    </div>

    <div class="card">
        <div class="title">۱ ماهه</div>
        <div class="price">350,000 تومان</div>
        <button class="buy" onclick="goPay('۱ ماهه',350000)">خرید</button>
    </div>

</div>

<!-- PAY -->
<div class="pay hidden" id="payBox">

    <h3>💳 پرداخت</h3>

    <div class="bank" id="info"></div>

    <!-- USER COUNT -->
    <p>👤 تعداد کاربر:</p>
    <select id="userCount" onchange="calcPrice()">
        <option value="1">1 کاربره</option>
        <option value="2">2 کاربره</option>
        <option value="3">3 کاربره</option>
    </select>

    <div class="bank" id="priceBox">قیمت: ---</div>

    <div class="bank" id="finalBox"></div>

    <button class="buy" onclick="copyCard()">کپی کارت</button>
    <button class="buy" onclick="paid()">✔ پرداخت کردم</button>

</div>

<script>

let basePrice=0;
let planName="";

function goPay(plan,price){

    planName = plan;
    basePrice = price;

    document.getElementById("info").innerHTML =
    "📦 پلن: " + plan;

    document.getElementById("plans").classList.add("hidden");
    document.getElementById("payBox").classList.remove("hidden");

    calcPrice();
}

function calcPrice(){

    let count = document.getElementById("userCount").value;

    let price = basePrice * count;

    // 🔥 تخفیف رندوم 10 تا 15 درصد
    let discountPercent = Math.floor(Math.random() * 6) + 10;

    let discount = Math.floor(price * (discountPercent / 100));

    let final = price - discount;

    document.getElementById("priceBox").innerHTML =
    "💰 قیمت اصلی: " + price + " تومان";

    document.getElementById("finalBox").innerHTML =
    "🔥 تخفیف: " + discountPercent + "% (-" + discount + ")<br><br>" +
    "<span class='discount'>💰 مبلغ نهایی: " + final + " تومان</span>";
}

function copyCard(){
    navigator.clipboard.writeText("6037997194784360");
    alert("کپی شد");
}

function paid(){
    alert("سفارش ثبت شد");
}

</script>

</body>
</html>
