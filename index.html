<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabeghe Clone</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"Vazirmatn",sans-serif;
    background:#070b14;
    color:white;
    direction:rtl;
}

/* GRID BACKGROUND مثل عکس */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}

/* TOP TIMER */
.top-bar{
    display:flex;
    justify-content:center;
    padding:15px;
}

.timer{
    padding:8px 18px;
    border-radius:25px;
    border:1px solid #2f81f7;
    color:#2f81f7;
    font-weight:bold;
    font-size:14px;
    box-shadow:0 0 20px rgba(47,129,247,0.3);
}

/* LOGO SECTION */
.logo-box{
    text-align:center;
    margin-top:20px;
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:radial-gradient(circle,#0d1b2a,#05070d);
    border:2px solid #2f81f7;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    color:#2f81f7;
    box-shadow:0 0 30px rgba(47,129,247,0.4);
}

.title{
    font-size:34px;
    margin-top:15px;
    font-weight:700;
    letter-spacing:1px;
}

/* BADGES */
.badges{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

.badge{
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.03);
}

/* WARNING BOX */
.warn{
    margin:25px auto;
    width:90%;
    max-width:420px;
    padding:15px;
    border-radius:14px;
    border:1px solid #f59e0b;
    background:rgba(245,158,11,0.08);
    color:#fbbf24;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* STEPS */
.steps{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:30px 10px;
}

.step{
    width:60px;
    text-align:center;
}

.circle{
    width:40px;
    height:40px;
    margin:auto;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
}

.step.active .circle{
    border-color:#2f81f7;
    color:#2f81f7;
    box-shadow:0 0 15px rgba(47,129,247,0.3);
}

.step span{
    font-size:11px;
    opacity:0.7;
}

/* SECTION */
.section{
    text-align:center;
    margin-top:20px;
}

.section h3{
    font-size:18px;
}

/* PLAN CARDS (پایین صفحه) */
.plans{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    margin-top:20px;
}

.plan{
    width:90%;
    max-width:380px;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.plan h4{
    margin:0;
    color:#2f81f7;
}

.plan p{
    opacity:0.7;
    margin:10px 0;
}

.price{
    color:#00e676;
    font-weight:bold;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#00c853,#00e676);
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="top-bar">
    <div class="timer" id="timer">13:38:31</div>
</div>

<div class="logo-box">
    <div class="logo">N</div>
    <div class="title">NabegheVPN</div>

    <div class="badges">
        <div class="badge">پشتیبانی ۲۴/۷</div>
        <div class="badge">سرعت بالا ⚡</div>
        <div class="badge">ترافیک نامحدود ∞</div>
    </div>
</div>

<div class="warn">
    <div>اختلال در برخی اپراتورها</div>
    <div>⚡</div>
</div>

<div class="steps">
    <div class="step active">
        <div class="circle">1</div>
        <span>انتخاب پلن</span>
    </div>
    <div class="step">
        <div class="circle">2</div>
        <span>تعداد کاربر</span>
    </div>
    <div class="step">
        <div class="circle">3</div>
        <span>شماره</span>
    </div>
    <div class="step">
        <div class="circle">4</div>
        <span>واریز</span>
    </div>
    <div class="step">
        <div class="circle">5</div>
        <span>دریافت</span>
    </div>
</div>

<div class="section">
    <h3>مدت زمان سرویس را انتخاب کنید</h3>
</div>

<div class="plans">

    <div class="plan">
        <h4>۲ هفته‌ای</h4>
        <p>نامحدود</p>
        <div class="price">120,000 تومان</div>
        <button>انتخاب</button>
    </div>

    <div class="plan">
        <h4>۱ ماهه</h4>
        <p>نامحدود</p>
        <div class="price">220,000 تومان</div>
        <button>انتخاب</button>
    </div>

</div>

<script>
// تایمر ساده مثل عکس
let h=13,m=38,s=31;

setInterval(()=>{
    s++;
    if(s==60){s=0;m++}
    if(m==60){m=0;h++}

    document.getElementById("timer").innerText =
    `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
},1000);
</script>

</body>
    </html>
