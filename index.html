<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه کانفیگ</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"Vazirmatn";
    background:#070b14;
    color:white;
    direction:rtl;
}

/* BACKGROUND GRID */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}

/* HEADER */
.header{
    text-align:center;
    padding:40px 15px 20px;
}

.header h1{
    font-size:26px;
    background:linear-gradient(90deg,#00c853,#2f81f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    opacity:0.7;
}

/* PLANS */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    padding:10px;
}

.card{
    width:92%;
    max-width:380px;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-3px);
    border-color:#00e676;
}

/* TITLE */
.title{
    font-size:18px;
    color:#2f81f7;
    margin-bottom:8px;
}

/* PRICE */
.price{
    margin:10px 0;
    color:#00e676;
    font-weight:bold;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    margin-top:8px;
}

.buy{
    background:linear-gradient(135deg,#00c853,#00e676);
}

.done{
    background:linear-gradient(135deg,#ffb300,#ff6f00);
}

/* PAY BOX */
.pay{
    width:92%;
    max-width:380px;
    margin:20px auto;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    text-align:center;
}

.bank{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
    border:1px solid rgba(255,255,255,0.1);
}

.hidden{display:none;}

.note{
    font-size:12px;
    opacity:0.7;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
    <h1>فروشگاه کانفیگ حرفه‌ای</h1>
    <p>سریع | پایدار | نامحدود</p>
</div>

<!-- PLANS -->
<div class="container" id="plans">

    <div class="card">
        <div class="title">🔵 ۱ هفته‌ای</div>
        <div>حجم نامحدود</div>
        <div class="price">120,000 تومان</div>
        <button class="buy" onclick="goPay('۱ هفته‌ای')">انتخاب</button>
    </div>

    <div class="card">
        <div class="title">🟣 ۲ هفته‌ای</div>
        <div>حجم نامحدود</div>
        <div class="price">220,000 تومان</div>
        <button class="buy" onclick="goPay('۲ هفته‌ای')">انتخاب</button>
    </div>

    <div class="card">
        <div class="title">🟢 ۱ ماهه</div>
        <div>حجم نامحدود</div>
        <div class="price">350,000 تومان</div>
        <button class="buy" onclick="goPay('۱ ماهه')">انتخاب</button>
    </div>

</div>

<!-- PAY -->
<div class="pay hidden" id="payBox">

    <h3>💳 پرداخت سفارش</h3>

    <div class="bank">
        6037 - 9971 - 9478 - 4360
        <br>
        ماهان امیدی
    </div>

    <div id="selected"></div>

    <button class="buy" onclick="copyCard()">کپی کارت</button>

    <button class="done" onclick="done()">✔ پرداخت کردم</button>

    <div class="note">بعد از زدن دکمه شما به پشتیبانی منتقل می‌شوید</div>

</div>

<script>

let selectedPlan="";

function goPay(plan){
    selectedPlan = plan;
    document.getElementById("selected").innerHTML =
    "پلن انتخابی: " + plan;

    document.getElementById("plans").classList.add("hidden");
    document.getElementById("payBox").classList.remove("hidden");
}

function copyCard(){
    navigator.clipboard.writeText("6037997194784360");
    alert("کپی شد");
}

function done(){
    // اینجا پیوی خودت
    window.location.href = "https://t.me/yourusername";
}

</script>

</body>
</html>
