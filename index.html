<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه کانفیگ</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"Vazirmatn";
    background:#070b14;
    color:white;
    direction:rtl;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;
}

/* HEADER */
.header{
    text-align:center;
    padding:35px 15px 10px;
}

.header h1{
    font-size:24px;
    background:linear-gradient(90deg,#00c853,#2f81f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* CARDS */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    padding:10px;
}

.card{
    width:92%;
    max-width:380px;
    padding:16px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.buy{
    background:linear-gradient(135deg,#00c853,#00e676);
}

/* PAY */
.pay{
    width:92%;
    max-width:380px;
    margin:20px auto;
    padding:16px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    text-align:center;
}

.bank{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
}

.hidden{display:none}

/* ADMIN */
.adminPanel{
    display:none;
    width:92%;
    max-width:420px;
    margin:30px auto;
    padding:16px;
    border-radius:16px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
}

.order{
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.1);
}

</style>
</head>

<body>

<div class="header">
    <h1>⚡ فروشگاه کانفیگ</h1>
</div>

<!-- PLANS -->
<div class="container" id="plans">

    <div class="card">
        <h3>۱ هفته‌ای</h3>
        <p>120,000 تومان</p>
        <button class="buy" onclick="goPay('۱ هفته‌ای','120000')">خرید</button>
    </div>

    <div class="card">
        <h3>۲ هفته‌ای</h3>
        <p>220,000 تومان</p>
        <button class="buy" onclick="goPay('۲ هفته‌ای','220000')">خرید</button>
    </div>

    <div class="card">
        <h3>۱ ماهه</h3>
        <p>350,000 تومان</p>
        <button class="buy" onclick="goPay('۱ ماهه','350000')">خرید</button>
    </div>

</div>

<!-- PAY -->
<div class="pay hidden" id="payBox">

    <h3>💳 پرداخت</h3>

    <div class="bank">
        💳 6037997194784360
        <br>
        ماهان امیدی
    </div>

    <div id="info"></div>

    <button class="buy" onclick="copyCard()">کپی کارت</button>
    <button class="buy" onclick="paid()">✔ پرداخت کردم</button>

    <div id="rubika" class="hidden">
        <p>📌 ارسال رسید به:</p>
        <div class="bank">@Omidi</div>
    </div>

</div>

<!-- 🔐 ADMIN LOGIN (HIDDEN) -->
<div style="text-align:center;margin-top:30px;">
    <input id="pass" type="password" placeholder="••••" style="padding:8px;border-radius:8px;border:none;">
    <button class="buy" onclick="checkAdmin()">ورود ادمین</button>
</div>

<!-- ADMIN PANEL -->
<div class="adminPanel" id="adminPanel">
    <h3>📊 پنل ادمین</h3>
    <button class="buy" onclick="loadOrders()">رفرش سفارش‌ها</button>
    <div id="orders"></div>
</div>

<script>

let selectedPlan="";
let selectedPrice="";

function goPay(plan,price){

    selectedPlan = plan;
    selectedPrice = price;

    document.getElementById("info").innerHTML =
    "📦 پلن: " + plan + "<br>💰 مبلغ: " + price;

    document.getElementById("plans").classList.add("hidden");
    document.getElementById("payBox").classList.remove("hidden");
}

function copyCard(){
    navigator.clipboard.writeText("6037997194784360");
    alert("کپی شد");
}

function paid(){

    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders.push({
        plan:selectedPlan,
        price:selectedPrice,
        time:new Date().toLocaleString()
    });

    localStorage.setItem("orders", JSON.stringify(orders));

    document.getElementById("rubika").classList.remove("hidden");

    alert("سفارش ثبت شد");
}

/* 🔐 ADMIN LOGIN */
function checkAdmin(){

    let pass = document.getElementById("pass").value;

    if(pass === "1388"){   // رمز ادمین
        document.getElementById("adminPanel").style.display="block";
        alert("خوش آمدی ادمین 😈");
    }else{
        alert("رمز اشتباهه ❌");
    }
}

/* LOAD ORDERS */
function loadOrders(){

    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    let html="";

    orders.forEach((o)=>{
        html += `
        <div class="order">
            📦 ${o.plan}<br>
            💰 ${o.price}<br>
            🕒 ${o.time}
        </div>
        `;
    });

    document.getElementById("orders").innerHTML = html;
}

</script>

</body>
</html>
