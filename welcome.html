<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خوش آمدید</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"Vazirmatn";
    background:#05070d;
    color:white;
    direction:rtl;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    overflow:hidden;
}

/* BACKGROUND GLOW */
.glow{
    position:absolute;
    width:300px;
    height:300px;
    background:#00e676;
    filter:blur(120px);
    opacity:0.2;
    border-radius:50%;
}

/* BOX */
.box{
    z-index:2;
    width:90%;
    max-width:420px;
}

/* TITLE */
h1{
    font-size:24px;
    background:linear-gradient(90deg,#00c853,#2f81f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    opacity:0.7;
}

/* LOADER */
.loader{
    width:60px;
    height:60px;
    border:4px solid rgba(255,255,255,0.1);
    border-top:4px solid #00e676;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
}

/* DOTS */
.dots::after{
    content:"";
    animation:dots 1.2s infinite;
}

@keyframes dots{
    0%{content:""}
    33%{content:"."}
    66%{content:".."}
    100%{content:"..."}
}

/* SMALL TEXT */
.small{
    font-size:12px;
    opacity:0.6;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="box">

    <h1>⚡ به فروشگاه کانفیگ ماهان خوش آمدی</h1>

    <p>در حال آماده‌سازی محیط امن<span class="dots"></span></p>

    <div class="loader"></div>

    <p class="small">لطفاً چند لحظه صبر کنید</p>

</div>

<script>

setTimeout(()=>{
    window.location.href = "index.html";
},3000);

</script>

</body>
</html>
